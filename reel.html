<!DOCTYPE html>
<html>
<head>
<title>Reel</title>

<style>

body{
background:#d4d4d4;
font-family:Arial,sans-serif;
margin:0;
padding-top:42px;
}

/* 上固定バー */
.topbar{
background:#f2cf43;
height:42px;
border-top:3px solid black;
border-bottom:3px solid black;
display:flex;
justify-content:flex-end;
align-items:center;
padding-right:30px;
gap:25px;
font-weight:900;
font-size:14px;
position:fixed;
top:0;
left:0;
width:100%;
box-sizing:border-box;
}

.topbar a{
color:black;
text-decoration:none;
}

.close{
width:26px;
height:26px;
border:3px solid black;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
line-height:.7;
}

/* 本体 */

.container{
padding:60px;
max-width:1000px;
}

h1{
font-size:110px;
font-weight:900;
letter-spacing:-5px;
color:white;
margin:0 0 20px;
}

.info{
font-size:12px;
font-weight:900;
text-align:right;
margin-top:10px;
}

/* 動画 */

.video{
border:3px solid black;
overflow:hidden;
}

.video iframe{
width:100%;
aspect-ratio:16/9;
border:none;
display:block;
}


/* パスワード */

.lockbox{
border:3px solid black;
padding:18px;
display:flex;
gap:8px;
align-items:center;
justify-content:center;
font-weight:900;
font-size:12px;
width:fit-content;
margin:auto;
margin-top:180px;
}

.lockbox input{
border:3px solid black;
padding:6px;
width:120px;
font-weight:900;
background:white;
}

.lockbox button{
border:3px solid black;
background:none;
padding:6px 10px;
font-weight:900;
cursor:pointer;
font-size:11px;
}

.lockbox button:hover{
background:#f2cf43;
}

</style>
</head>

<body>

<div class="topbar">
<a href="index.html">HOME</a>
<a href="works.html">WORKS</a>
<a href="reel.html">REEL</a>
<div class="close">✕</div>
</div>

<div class="container">

<h1>REEL</h1>


<div id="videoLock">

<div class="lockbox">

PASSWORD

<input
type="password"
id="videoPassword">

<button onclick="unlockVideo()">
ENTER
</button>

</div>

</div>


<div
id="realVideo"
style="display:none;">

<div class="video">

<iframe
src="https://player.vimeo.com/video/1190915325">
</iframe>

</div>

<div class="info">
Last Updated 2026/05/27
</div>

</div>

</div>


<script>

function unlockVideo(){

let pw=
document.getElementById(
"videoPassword"
).value;

if(pw==="magic_comper30"){

document.getElementById(
"videoLock"
).style.display="none";

document.getElementById(
"realVideo"
).style.display="block";

}

else{

alert("wrong password");

}

}

</script>

</body>
</html>
