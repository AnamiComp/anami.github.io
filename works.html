<!DOCTYPE html>
<html>
<head>
<title>Works</title>

<style>

body{
background:#d4d4d4;
font-family:Arial,sans-serif;
margin:0;
padding:0;
}


/* 上の黄色バー */
.topbar{
background:#f2cf43;
height:42px;
border-top:3px solid black;
border-bottom:3px solid black;
display:flex;
justify-content:flex-end;
align-items:center;
padding-right:30px;
gap:25px;
font-weight:900;
font-size:14px;
}
.topbar a{
color:black;
text-decoration:none;
}
.topbar a:hover{
opacity:.6;
}
.close{
width:26px;
height:26px;
border:3px solid black;
display:flex;
justify-content:center;
align-items:center;
font-weight:900;
font-size:22px;
line-height:.7;
box-sizing:border-box;
}

/* タイトル */
h1{
font-size:110px;
font-weight:900;
letter-spacing:-5px;
color:white;
margin:40px 50px;
line-height:.9;
}

/* ギャラリー */
.gallery{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:35px;
padding:0 50px 80px;
}

/* ポスターカード */
.card{
aspect-ratio:2/3;
overflow:hidden;
background:white;
cursor:pointer;
transition:.25s;
border:3px solid black;
}

.card:hover{
transform:
translateY(-8px)
rotate(-1deg);
}

/* 画像 */
.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}
/* 画像トリミング調整 */
.right img{
object-position:right center;
}
.right2 img{
object-position:84% center;
}
.right3 img{
object-position:89% center;
}
.left img{
object-position:left center;
}
.left2 img{
object-position:20% center;
}
.left3 img{
object-position:7% center;
}

.filter{
display:flex;
gap:18px;
padding:0 50px 40px;
flex-wrap:wrap;
font-weight:900;
}
.filter button{
background:none;
border:none;
padding:0;
font-weight:900;
cursor:pointer;
font-size:14px;
font-family:inherit;
}
.filter button:hover{
opacity:.5;
}
.filter button.active{
color:#f2cf43;
}

</style>

</head>

  
<body>
  
<div class="topbar">
<a href="index.html">HOME</a>
<a href="works.html">WORKS</a>
<div class="close">✕</div>
</div>

  
<h1>WORKS</h1>

<div class="filter">
<button class="active"onclick="filterSelection('all')">ALL</button>
<button onclick="filterSelection('film')">FILM</button>
<button onclick="filterSelection('episodic')">EPISODIC</button>
<button onclick="filterSelection('music')">MUSIC VIDEO</button>
<button onclick="filterSelection('ad')">ADVERTISING</button>
<button onclick="filterSelection('other')">OTHER</button>
</div>


<div class="gallery">

<!-- 2023 -->

<div class="card episodic"><img src="2023/2023_04_DragonsofWonderhatch.jpeg"></div>
<div class="card episodic"><img src="2023/2023_05_YuYuHakusho.jpg"></div>

<!-- 2024 -->
<div class="card film"><img src="2024/2024_01_BluePiriod.jpg"></div>
<div class="card episodic"><img src="2024/2024_02_ChastityHigh.jpg"></div>
<div class="card film"><img src="2024/2024_03_Hakkenden.jpg"></div>
<div class="card episodic"><img src="2024/2024_04_Oshinoko.jpg"></div>

<!-- 2025 -->
<div class="card episodic"><img src="2025/2025_01_GANNIBAL.jpeg"></div>
<div class="card episodic"><img src="2025/2025_02_DeadorLove.jpg"></div>
<div class="card other"><img src="2025/2025_03_Expo2025.jpg"></div>
<div class="card music"><img src="2025/2025_04_Angel&Devil.jpg"></div>
<div class="card other"><img src="2025/2025_05_BABELnoTHO.jpg"></div>
<div class="card film"><img src="2025/2025_06_Catchingthe.jpg"></div>
<div class="card episodic"><img src="2025/2025_07_GlassHeart.jpg"></div>
<div class="card film"><img src="2025/2025_08_FakingBeethoven.jpg"></div>
<div class="card right3 ad"><img src="2025/2025_09_ROHTO.jpg"></div>
<div class="card music"><img src="2025/2025_10_HachaMecha.jpg"></div>
<div class="card episodic"><img src="2025/2025_11_LastSamuraiStanding.jpg"></div>
<div class="card music"><img src="2025/2025_12_BREAKitDOWN.jpg"></div>
<div class="card episodic"><img src="2025/2025_13_QOM.jpg"></div>

<!-- 2026 -->
<div class="card film"><img src="2026/2026_01_KyojoReUnion.jpg"></div>

</div>

<script>
function filterSelection(category){
let cards=document.querySelectorAll(".card");
let buttons=document.querySelectorAll(".filter button");
buttons.forEach(button=>{
button.classList.remove("active");
});
event.target.classList.add("active");
cards.forEach(card=>{
if(category==="all"){
card.style.display="block";
}
else if(card.classList.contains(category)){
card.style.display="block";
}
else{
card.style.display="none";
}
});
}
</script>
  
</body>

</html>
