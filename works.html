<!DOCTYPE html>
<html>
<head>
<title>Works</title>

<style>

body{
background:#f3f3f3;
font-family:Arial;
margin:0;
padding:50px;
}

h1{
font-size:60px;
margin-bottom:50px;
color:#111;
}

.gallery{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:30px;

}

.card{

aspect-ratio:2/3;

overflow:hidden;

border-radius:14px;

background:white;

transition:.3s;

cursor:pointer;

box-shadow:
0 5px 15px rgba(0,0,0,.08);

}

.card:hover{

transform:
translateY(-8px);

}

.card img{

width:100%;
height:100%;
object-fit:cover;

display:block;

}

.right img{
object-position:right center;
}

.right2 img{
object-position:50% center;
}

.left img{
object-position:left center;
}

.left2 img{
object-position:20% center;
}

</style>

</head>

<body>

<h1>WORKS</h1>

<div class="gallery">
