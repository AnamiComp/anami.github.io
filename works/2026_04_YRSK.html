<!DOCTYPE html>
<html>
<head>
<title>Ichinenshō: Martian</title>

<style>

body{
background:#d4d4d4;
font-family:Arial,sans-serif;
margin:0;
padding-top:42px;
}

/* 上固定バー */
.topbar{
background:#f2cf43;
height:42px;
border-top:3px solid black;
border-bottom:3px solid black;
display:flex;
justify-content:flex-end;
align-items:center;
padding-right:30px;
gap:25px;
font-weight:900;
font-size:14px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:100;
box-sizing:border-box;
}

.topbar a{
color:black;
text-decoration:none;
}

.topbar a:hover{
opacity:.6;
}

.close{
width:26px;
height:26px;
border:3px solid black;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
line-height:.7;
box-sizing:border-box;
}


/* 本体 */

.container{
padding:60px;
max-width:1000px;
}


/* タイトル */

h1{
font-size:72px;
margin:0;
margin-left:-7px;
font-weight:900;
letter-spacing:-3px;
line-height:.95;
color:black;
}

.subTitle{
font-size:46px;
display:block;
margin-top:8px;
letter-spacing:-1px;
}

.jp{
font-size:12px;
font-weight:900;
margin-top:8px;
margin-bottom:30px;
color:black;
opacity:.55;
}


/* 情報 */

.info{
font-size:14px;
font-weight:900;
line-height:2;
margin-bottom:35px;
color:black;
}

.info div{
margin-bottom:4px;
}


/* ボタン */

.buttons{
display:flex;
gap:10px;
margin-bottom:50px;
}

.btn{
border:3px solid black;
padding:8px 14px;
background:none;
text-decoration:none;
color:black;
font-weight:900;
font-size:12px;
display:inline-block;
transition:.2s;
}

.btn:hover{
background:#f2cf43;
transform:translateY(-3px);
}


/* パス */

.watchtext{

font-size:12px;
font-weight:900;

margin-bottom:12px;

color:black;
opacity:.55;
}

.lockbox{

border:3px solid black;

padding:18px;

display:flex;
gap:10px;

align-items:center;

width:fit-content;

font-size:12px;
font-weight:900;

margin-bottom:40px;
}

.lockbox input{

border:3px solid black;

padding:8px;

width:140px;

font-weight:900;

background:white;
}

.lockbox button{

border:3px solid black;

background:none;

padding:8px 12px;

font-weight:900;

cursor:pointer;
}

.lockbox button:hover{
background:#f2cf43;
}


/* 動画 */

#videoContent{
display:none;
}

.video{
margin-top:40px;
border:3px solid black;
overflow:hidden;
}

.video iframe{
width:100%;
aspect-ratio:16/9;
border:none;
display:block;
}

.back{
display:inline-block;
margin-top:45px;
font-size:12px;
font-weight:900;
color:black;
text-decoration:none;
}

</style>
</head>

<body>

<div class="topbar">
<a href="index.html">HOME</a>
<a href="reel.html">REEL</a>
<a href="works.html">WORKS</a>
<a href="about.html">ABOUT</a>
<div class="close">✕</div>
</div>


<div class="container">

<h1>

"Martian"

<br>

<span class="subTitle">

LIVE Tour 2026 "Ichinenshō"

</span>

</h1>


<div class="jp">

「火星人」Live Visual for ヨルシカ LIVE Tour 2026 "一人称"

</div>



<div class="info">

<div>2026</div>
<div>Live Visual</div>
<div>TICKET: / Compositor</div>

</div>


<div class="buttons">

<a class="btn"
href="https://yorushika.com/feature/livetour2026_ichininsho"
target="_blank">

OFFICIAL WEBSITE

</a>

</div>



<div id="lock">

<div class="watchtext">

WATCH MOVIE (PASSWORD REQUIRED)

</div>


<div class="lockbox">

PASSWORD

<input
type="password"
id="pw">

<button
onclick="unlock()">

ENTER

</button>

</div>

</div>



<div id="videoContent">

<div class="video">

<iframe
src="https://player.vimeo.com/video/1195967223">
</iframe>

</div>

</div>


<a
class="back"
href="../works.html">

← BACK TO WORKS

</a>


</div>



<script>

function unlock(){

let pw=
document.getElementById("pw").value;

if(
pw==="magic_comper30"
){

document
.getElementById(
"lock"
)
.style.display="none";


document
.getElementById(
"videoContent"
)
.style.display="block";

}

else{

alert(
"wrong password"
);

}

}

</script>

</body>
</html>
